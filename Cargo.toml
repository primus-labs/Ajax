[workspace]

members = ["mpc", "network", "emp-bindings", "thfhe"]

resolver = "2"

[workspace.dependencies]
thiserror = "2"
rand = "0.8"
itertools = "0.14"
bytemuck = "1.23.1"
libp2p = { version = "0.56.0", features = ["tokio", "quic", "gossipsub", "macros"] }
libp2p-stream = "0.4.0-alpha"
serde = { version = "1.0.219", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1.41"
futures = "0.3.31"

criterion = "0.7.0"

[profile.bench]
lto = true
codegen-units = 1
